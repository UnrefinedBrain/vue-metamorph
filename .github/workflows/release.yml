name: Publish
on:
  workflow_dispatch:
    inputs:
      release_type:
        type: choice
        required: true
        options:
          - patch
          - minor
          - major


permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: ^9.9.0
          run_install: false
      - name: Install dependencies
        run: pnpm install
      - name: Bump version
        run: |
          git config user.name 'vue-metamorph release bot'
          git config user.email 'unrefinedbrain@users.noreply.github.com'

          npm version ${{ inputs.release_type }}
          git push --follow-tags origin master
      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
            VERSION=v$(cat package.json | jq --raw-output .version)
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              /repos/UnrefinedBrain/vue-metamorph/releases \
            -f tag_name="$VERSION" \
            -F draft=false \
            -F prerelease=false \
            -F generate_release_notes=true

      - name: Build
        run: pnpm build
      - name: Verify package.json file references exist
        run: node scripts/verify-package-files.js
      - name: Publish
        run: npm publish --access=public --provenance
